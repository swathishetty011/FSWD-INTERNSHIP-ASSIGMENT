<!DOCTYPE html>
<html>
<head>
<title>Responsive Hero Page</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

body{
    margin:0;
    font-family: Arial, sans-serif;
}

/* Hero Section */

.hero{
    display:flex;
    align-items:center;
    justify-content:space-between;
    padding:60px;
    background:linear-gradient(to right,#4facfe,#00f2fe);
    color:white;
}

/* Text Section */

.hero-text{
    flex:1;
}

.hero-text h1{
    font-size:40px;
}

.hero-text p{
    font-size:18px;
    margin:20px 0;
}

.hero-text button{
    padding:12px 25px;
    border:none;
    background:white;
    color:#333;
    font-size:16px;
    border-radius:6px;
    cursor:pointer;
}

.hero-text button:hover{
    background:#f1f1f1;
}

/* Image Section */

.hero-img{
    flex:1;
    text-align:center;
}

.hero-img img{
    width:300px;
}

/* Mobile Responsive */

@media (max-width:768px){

.hero{
    flex-direction:column;
    text-align:center;
    padding:40px 20px;
}

.hero-text h1{
    font-size:28px;
}

.hero-img img{
    width:200px;
    margin-top:20px;
}

}

</style>

</head>

<body>

<section class="hero">

<div class="hero-text">

<h1>Welcome to My Website</h1>

<p>
This is a responsive hero section created using Flexbox.
It automatically adjusts for mobile devices.
</p>

<button>Get Started</button>

</div>

<div class="hero-img">

<img src="https://cdn-icons-png.flaticon.com/512/1055/1055687.png">

</div>

</section>

</body>
</html>
